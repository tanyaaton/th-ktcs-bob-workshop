# ============================================================================
# Payment Application - Kubernetes/OpenShift Deployment Manifests
# ============================================================================
# This file contains all resources needed to deploy the payment processing
# application to Kubernetes/OpenShift clusters.
#
# Placeholders:
#   ${NAMESPACE}  - Target namespace (injected at deploy time)
#   ${IMAGE_TAG}  - Container image tag (injected at deploy time)
#
# Resources included:
#   - Deployment (3 replicas with health checks and resource limits)
#   - Service (ClusterIP for internal communication)
#   - Route (OpenShift ingress with TLS)
#   - PodDisruptionBudget (high availability configuration)
# ============================================================================

---
# ============================================================================
# Deployment
# ============================================================================
# Manages the payment application pods with 3 replicas for high availability.
# Includes health checks, resource limits, and security contexts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app
  namespace: ${NAMESPACE}
  labels:
    app: payment-app
    component: backend
    version: v1
  annotations:
    description: "Payment processing application deployment"
    app.openshift.io/connects-to: "h2-database"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-app
  template:
    metadata:
      labels:
        app: payment-app
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      # Security: Run containers as non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      
      containers:
      - name: payment-app
        # Image from OpenShift internal registry with dynamic tag
        image: image-registry.openshift-image-registry.svc:5000/${NAMESPACE}/payment-app:${IMAGE_TAG}
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        # Resource management for optimal performance and cluster stability
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        
        # Readiness probe: Determines when pod is ready to receive traffic
        # Checks Spring Boot Actuator health endpoint
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # Liveness probe: Determines when to restart the container
        # Checks Spring Boot Actuator health endpoint
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        
        # Container-level security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          # H2 database needs write access for data files
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        
        # Environment variables for application configuration
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SERVER_PORT
          value: "8080"
        - name: JAVA_OPTS
          value: "-Xmx384m -Xms256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

---
# ============================================================================
# Service
# ============================================================================
# ClusterIP service for internal communication within the cluster.
# Exposes the payment application on port 8080.
apiVersion: v1
kind: Service
metadata:
  name: payment-app
  namespace: ${NAMESPACE}
  labels:
    app: payment-app
    component: backend
  annotations:
    description: "Payment application service"
    service.alpha.openshift.io/dependencies: '[{"name": "payment-app", "kind": "Service"}]'
spec:
  type: ClusterIP
  selector:
    app: payment-app
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None

---
# ============================================================================
# Route (OpenShift)
# ============================================================================
# OpenShift Route for external access with TLS termination.
# Provides HTTPS endpoint and redirects HTTP to HTTPS.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: payment-app
  namespace: ${NAMESPACE}
  labels:
    app: payment-app
    component: backend
  annotations:
    description: "Payment application external route"
    haproxy.router.openshift.io/timeout: "60s"
    haproxy.router.openshift.io/balance: "roundrobin"
spec:
  to:
    kind: Service
    name: payment-app
    weight: 100
  port:
    targetPort: http
  tls:
    # Edge termination: TLS is terminated at the router
    termination: edge
    # Redirect HTTP traffic to HTTPS
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None

---
# ============================================================================
# PodDisruptionBudget
# ============================================================================
# Ensures high availability during voluntary disruptions (e.g., node drains).
# Allows maximum 1 pod to be unavailable at a time.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment-app-pdb
  namespace: ${NAMESPACE}
  labels:
    app: payment-app
    component: backend
  annotations:
    description: "Payment application pod disruption budget for high availability"
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: payment-app

